# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

version: 2

before:
  hooks:
    # You may remove this if you don't use go modules.
    - go mod tidy

builds:
  - main: ./cmd/picsum/
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    ldflags:
      - "-s"
      - "-w"
      - "-X github.com/siakhooi/picsum/internal/versioninfo.Version={{.Version}}"
      - "-X github.com/siakhooi/picsum/internal/versioninfo.Date={{.Date}}"
      - "-X github.com/siakhooi/picsum/internal/versioninfo.Commit={{.Commit}}"

archives:
  - formats: [tar.gz]
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats: [zip]

nfpms:
  - package_name: siakhooi-picsum
    file_name_template: "{{ .ConventionalFileName }}"
    vendor: siakhooi
    homepage: https://github.com/siakhooi/picsum
    maintainer: siakhooi
    description: fetch photo from https://picsum.photos
    license: MIT
    bindir: /usr/bin
    formats:
      - deb
      - rpm

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  footer: >-

    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).
